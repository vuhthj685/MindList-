name: 打包桌面客户端

on:
  # 手动触发（在 GitHub 仓库的 Actions 页面手动运行）
  workflow_dispatch:
    inputs:
      platform:
        description: '打包平台'
        required: true
        default: 'windows'
        type: choice
        options:
          - windows
          - mac
          - linux
          - all
  # 发布 Tag 时自动触发
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 打包 Windows 客户端
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'windows' ||
      inputs.platform == 'all'
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 web 依赖
        working-directory: web
        run: npm ci

      - name: 构建 Vue 项目（Electron 模式）
        working-directory: web
        env:
          IS_ELECTRON: 'true'
          NODE_ENV: production
        run: npm run build:electron

      - name: 安装 Electron 依赖
        working-directory: electron
        run: npm install

      - name: 打包 Windows 安装包
        working-directory: electron
        run: npm run build:win

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron-dist/*.exe
          retention-days: 7

  build-mac:
    name: 打包 macOS 客户端
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'mac' ||
      inputs.platform == 'all'
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 web 依赖
        working-directory: web
        run: npm ci

      - name: 构建 Vue 项目（Electron 模式）
        working-directory: web
        env:
          IS_ELECTRON: 'true'
          NODE_ENV: production
        run: npm run build:electron

      - name: 安装 Electron 依赖
        working-directory: electron
        run: npm install

      - name: 打包 macOS 安装包
        working-directory: electron
        run: npm run build:mac

      - name: 上传 macOS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: electron-dist/*.dmg
          retention-days: 7

  build-linux:
    name: 打包 Linux 客户端
    if: >
      github.event_name == 'push' ||
      inputs.platform == 'linux' ||
      inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 web 依赖
        working-directory: web
        run: npm ci

      - name: 构建 Vue 项目（Electron 模式）
        working-directory: web
        env:
          IS_ELECTRON: 'true'
          NODE_ENV: production
        run: npm run build:electron

      - name: 安装 Electron 依赖
        working-directory: electron
        run: npm install

      - name: 打包 Linux 安装包
        working-directory: electron
        run: npm run build:linux

      - name: 上传 Linux 安装包
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: electron-dist/*.AppImage
          retention-days: 7

  # 发布 Release（仅在推送 Tag 时）
  release:
    name: 发布 Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有安装包
        uses: actions/download-artifact@v4
        with:
          path: ./installers

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./installers/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
