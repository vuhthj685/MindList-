name: 部署 GitHub Pages

on:
  push:
    branches:
      - main  # 推送到 main 分支时自动触发

# 允许 Actions 写入 GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 准备部署文件（直接使用 main 分支已构建好的文件）
      - name: 准备部署文件
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r dist deploy/
          touch deploy/.nojekyll

      # 3. 部署到 gh-pages 分支
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
